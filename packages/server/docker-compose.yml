version: "3.9"

services:
  # Dev Container target — long-running shell so VS Code can attach
  server:
    image: node:20-bookworm-slim
    working_dir: /workspace
    volumes:
      - ../..:/workspace:cached
    command: sleep infinity
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: "postgresql://swarmvault:swarmvault_dev_password@postgres:5432/swarmvault"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    container_name: swarmvault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarmvault
      POSTGRES_PASSWORD: swarmvault_dev_password
      POSTGRES_DB: swarmvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: swarmvault_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
